<html>

<body>
<x-dc>

  <style>

          <text x="1150" y="245" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#ddd" font-weight="600">AI 테스트</text>

          <text x="350" y="452" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" font-weight="600" fill="#FF5700">13</text>
          <text x="350" y="478" text-anchor="middle" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="#FF5700" font-weight="700">리포트 완성</text>

      </svg>
  </div>

  <!-- ============ DETAIL PANEL (single card, driven by click) ============ -->
  <div style="max-width: 1440px; margin: 0 auto; padding: 0 64px 96px;">
    <sc-if value="{{ showDetail }}" hint-placeholder-val="{{ true }}">
      <div style="background: #131316; border: 1px solid #1e1e22; border-radius: 12px; padding: 28px 32px; display: flex; gap: 24px; align-items: flex-start;">
        <div style="font-family: 'IBM Plex Sans', sans-serif; font-size: 48px; font-weight: 800; color: #FF5700; line-height: 1; min-width: 56px;">{{ selectedNum }}</div>
        <div style="flex: 1; padding-top: 4px;">
          <div style="background: #FF5700; border-radius: 8px; padding: 10px 18px; margin-bottom: 12px; display: inline-block;">
            <span style="font-size: 14px; font-weight: 600; color: #fff;">{{ selectedTitle }}</span>
          </div>
          <div style="background: #f5f5f0; border-radius: 8px; padding: 14px 20px; margin-bottom: 8px;">
            <p style="font-size: 14px; color: #1a1a1a; line-height: 1.7; margin: 0;">{{ selectedDesc }}</p>
          </div>
          <sc-if value="{{ selectedNote }}" hint-placeholder-val="{{ false }}">
            <div style="background: #f5f5f0; border-radius: 8px; padding: 14px 20px; margin-bottom: 8px;">
              <p style="font-size: 13px; color: #555; line-height: 1.6; margin: 0;">{{ selectedNote }}</p>
            </div>
          </sc-if>
          <sc-if value="{{ selectedWarning }}" hint-placeholder-val="{{ false }}">
            <div style="background: #1a1510; border: 1px solid #FF570033; border-radius: 8px; padding: 12px 18px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px;">
              <span style="font-size: 14px; flex-shrink: 0;">⚠️</span>
              <p style="font-size: 13px; color: #FF5700cc; line-height: 1.6; margin: 0; font-weight: 500;">{{ selectedWarning }}</p>
            </div>
          </sc-if>
          <sc-if value="{{ selectedOutput }}" hint-placeholder-val="{{ false }}">
            <div style="display: inline-flex; align-items: center; gap: 6px; padding: 4px 0;">
              <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #FF5700;">→</span>
              <span style="font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #888;">{{ selectedOutput }}</span>
            </div>
          </sc-if>
        </div>
      </div>
    </sc-if>
    <sc-if value="{{ showHint }}" hint-placeholder-val="{{ true }}">

        <p style="font-size: 14px; color: #555; margin: 0;">노드를 클릭하면 상세 내용이 표시됩니다</p>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { selected: null };

  steps = [
    { num: '0', title: '기획 정렬 — 기획 셋업(Scoping)', desc: '클라이언트 사이트 훑어보고, 경쟁사 정하고, 어떤 키워드로 시작할지 방향을 잡아요.', output: null, warning: null, note: null, isData: false },
    { num: '1', title: '유효 키워드 뽑기 — 쿼리 파인더 (AI Overview 필터)', desc: '쿼리 파인더로, AI가 실제로 화면에 띄우는 키워드만 걸러내요. 이 키워드들은 검색량 순서로 줄을 세워서 다음 단계에 쓸 우선순위를 정해요.', output: '유효 쿼리 풀(Valid Query Pool) 확보', warning: null, note: null, isData: true },
    { num: '2', title: '소비자 상황 뽑기 — CEP 파인더 (Category Entry Point)', desc: 'CEP 파인더로, 사람들이 "어떤 상황에서" 이 제품을 찾는지 봐요. 이게 나중에 AI한테 던질 질문(프롬프트)의 원재료가 돼요.', output: '프롬프트 원본 시나리오 확보', warning: null, note: null, isData: true },
    { num: '3', title: '인식 그룹 뽑기 — 클러스터 파인더', desc: '클러스터 파인더로, 소비자들이 이 제품을 머릿속에서 어떻게 나눠서 생각하는지 봐요. 이 그룹이 나중에 "페르소나 종류"의 뼈대가 돼요.', output: '소비자 인식 클러스터 → 페르소나 카테고리 설계', warning: null, note: null, isData: true },
    { num: '4', title: '페르소나 확정 — 페르소나 설계 (LM 데이터 기반, 가설 금지)', desc: '1~3단계 데이터를 가지고 페르소나 5개를 만들어요. 이 때 사람이 최종 확인/승인해요.', output: null, warning: '페르소나와 질문은 반드시 1~3단계 실데이터로만 만들어요. AI가 추측으로 만들면, 실제 소비자가 쓰지 않는 질문이 섞여서 테스트 결과 자체가 왜곡돼요.', note: null, isData: false },
    { num: '5', title: '질의세트 작성 — 1~3단계 결과물 기반', desc: '페르소나 1개당 질문 20개, 총 100개 질문을 만들어요.', output: '질의세트(Query Set)', warning: '질문에 브랜드 이름을 직접 넣으면, AI가 해당 브랜드를 언급할 확률이 인위적으로 올라가서 SoM/SoV 측정값이 실제보다 부풀려져요.', note: null, isData: false },
    { num: '6', title: '최종 검증 — 패스 파인더', desc: '패스 파인더로, 소비자가 제품을 사기까지 어떤 여정(단계)을 거치는지 보고, 4단계에서 만든 질문들이 이 여정의 어느 부분을 놓치고 있는지 확인해요.', output: '질의세트 퍼널 커버리지 검증(Funnel Coverage Validation)', warning: null, note: null, isData: true },
    { num: '7', title: 'AI 테스트 실행 — AI 패널 테스트(User Test, UT)', desc: '완성된 질의세트를 AI들한테 실제로 물어봐요. 일반 소비자가 실제로 쓰는 환경과 똑같이, 무료 또는 저가 구독 모델을 써요.', output: null, warning: null, note: null, isData: false },
    { num: '8', title: '답변 원본 수집 — 원본 응답 시트(Raw Response Sheet)', desc: 'AI들이 낸 답변을 전부 크롤링해서 하나의 시트로 모아요. (나중에 답변 패턴을 다시 추적/검증할 때 쓰는 원본 데이터예요)', output: null, warning: null, note: null, isData: false },
    { num: '9', title: '답변 분석 — SoM/SoV 분석 + 경쟁사 언급 추출', desc: '이 답변들을 갖고 브랜드가 얼마나 언급됐는지(SoM), 전체 언급 중 비중이 얼마나 되는지(SoV)를 계산하고, AI가 어떤 경쟁사를 인용했는지 뽑아내요.', output: null, warning: null, note: '(참고로 감성 분석, Perplexity 인용 URL 분석도 같은 단계에서 같이 봐요.)', isData: false },
    { num: '10', title: '경쟁사 정의 — 경쟁사 언급 추출(Competitor Mention Extraction)', desc: 'AI가 언급하는 경쟁사들을 나열해요.', output: null, warning: null, note: null, isData: false },
    { num: '11', title: '사이트 진단 — 경쟁사 기술 진단(Competitor Technical GEO Audit)', desc: '10단계에서 뽑힌 경쟁사 상위 3곳의 사이트 구조를 하나씩 분석해요. (llms.txt 있는지, Schema.org 마크업 있는지, FAQ 마크업 있는지 등)', output: null, warning: null, note: null, isData: false },
    { num: '12', title: '우리 vs 경쟁사 비교 — 경쟁사 벤치마킹(Competitive Benchmarking)', desc: '자사 사이트와 경쟁사 사이트 구조를 나란히 비교해요.', output: null, warning: null, note: null, isData: false },
    { num: '13', title: '리포트 완성', desc: '9단계(답변 분석 데이터)와 12단계(사이트 구조 비교 데이터)를 합쳐서 최종 리포트를 만들어요.', output: null, warning: null, note: null, isData: false },
  ];

  selectNode(idx) {
    this.setState({ selected: this.state.selected === idx ? null : idx });
  }

  nodeStroke(idx, defaultStroke) {
    return this.state.selected === idx ? '#FF5700' : defaultStroke;
  }
  nodeSW(idx, defaultSW) {
    return this.state.selected === idx ? 3 : defaultSW;
  }

  renderVals() {
    var s = this.state.selected;
    var step = s !== null ? this.steps[s] : null;
    var vals = {
      showDetail: s !== null,
      showHint: s === null,
      selectedNum: step ? step.num : '',
      selectedTitle: step ? step.title : '',
      selectedDesc: step ? step.desc : '',
      selectedOutput: step ? step.output : null,
      selectedWarning: step ? step.warning : null,
      selectedNote: step ? step.note : null,
    };

    // Data nodes: 1,2,3,6
    var dataDefault = '#FF5700';
    var procDefault = '#333';

    for (var i = 0; i <= 13; i++) {
      var isData = this.steps[i].isData;
      var def = isData ? dataDefault : procDefault;
      var defSW = (i === 13) ? 2 : 1.5;
      vals['sel' + i + 'stroke'] = this.nodeStroke(i, def);
      vals['sel' + i + 'sw'] = this.nodeSW(i, defSW);
      vals['onClickNode' + i] = this.selectNode.bind(this, i);
    }

    return vals;
  }
}
