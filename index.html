<!DOCTYPE html>
<html lang="ko">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0e0e10;

  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 20px 80px;
}
.header{max-width:1000px;text-align:center;margin-bottom:32px}
.header h1{font-size:26px;font-weight:700;color:#fff;margin-bottom:8px}
.header p{font-size:14px;color:#8c8c93}
.canvas-wrap{
  width:100%;max-width:1920px;
  overflow-x:auto;
  border-radius:16px;
  border:1px solid #222;
}
.canvas-wrap svg{display:block;width:100%;height:auto;min-width:1200px}
.legend{
  display:flex;gap:28px;margin-top:24px;
  font-size:13px;color:#8c8c93;
}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:14px;height:14px;border-radius:4px}
.legend-dot.data{border:1.5px dashed #6C8CFF;background:rgba(108,140,255,.1)}
.legend-dot.proc{border:1.5px solid #3a3a40;background:#292930}
